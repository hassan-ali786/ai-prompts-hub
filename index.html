<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prompt Studio Pro</title>

<style>
:root {
  --bg: #070b14;
  --card: #0f172a;
  --text: #e5e7eb;
  --muted: #9ca3af;
  --border: #1f2937;
}

/* LIGHT MODE */
.light {
  --bg: #f5f7fb;
  --card: #ffffff;
  --text: #111827;
  --muted: #4b5563;
  --border: #e5e7eb;
}

body {
  margin: 0;
  font-family: system-ui;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

/* NAV */
nav {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-weight: 700;
}

.toggle {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
}

/* HERO */
.hero {
  text-align: center;
  padding: 70px 20px 40px;
}

.hero h1 {
  font-size: 48px;
  margin: 0;
}

.hero p {
  color: var(--muted);
}

/* BUTTON */
.btn {
  padding: 12px 18px;
  background: linear-gradient(135deg,#3b82f6,#2563eb);
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 15px;
}

/* CONTAINER */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
}

.card {
  background: var(--card);
  padding: 18px;
  border-radius: 14px;
  border: 1px solid var(--border);
}

/* TOOL */
.tool {
  background: var(--card);
  padding: 22px;
  border-radius: 14px;
  border: 1px solid var(--border);
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
}

/* OUTPUT */
.output {
  margin-top: 20px;
  padding: 15px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 12px;
  min-height: 120px;
  white-space: pre-wrap;
}

/* COPY */
.smallBtn {
  margin-top: 10px;
  padding: 10px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .hero h1 {
    font-size: 32px;
  }

  .container {
    padding: 12px;
  }

  nav {
    flex-direction: column;
    gap: 10px;
  }
}
</style>

</head>

<body>

<nav>
  <div class="logo">Prompt Studio Pro</div>
  <button class="toggle" onclick="toggleTheme()">Light / Dark</button>
</nav>

<div class="hero">
  <h1>Generate Premium AI Prompts</h1>
  <p>Smart prompts for coding, study, business and career growth</p>
  <button class="btn" onclick="document.getElementById('tool').scrollIntoView({behavior:'smooth'})">
    Start Now
  </button>
</div>

<div class="container">

<div class="grid">
  <div class="card">Study & Learning Tools</div>
  <div class="card">Coding Help</div>
  <div class="card">Career Builder</div>
  <div class="card">Startup Ideas</div>
</div>

</div>

<div class="container" id="tool">

<div class="tool">

<h3>AI Prompt Generator</h3>

<select id="task">
<option>LinkedIn Post</option>
<option>Study Notes</option>
<option>Project Ideas</option>
<option>Resume Improvement</option>
<option>Code Explanation</option>
<option>Startup Idea</option>
<option>Interview Prep</option>
<option>Marketing Strategy</option>
<option>Business Plan</option>
</select>

<input id="topic" placeholder="Enter topic">

<button class="btn" onclick="generate()">Generate</button>

<div class="output" id="output">Your result will appear here...</div>

<button class="smallBtn" onclick="copy()">Copy</button>

</div>

</div>

<script>

function generate(){
  let task = document.getElementById("task").value;
  let topic = document.getElementById("topic").value;

  if(!topic.trim()){
    document.getElementById("output").innerText = "Please enter a topic first.";
    return;
  }

  const map = {
    "LinkedIn Post": `Write a viral LinkedIn post about "${topic}" with hook, story, insights and CTA.`,
    "Study Notes": `Create exam-ready notes on "${topic}" with examples and summary.`,
    "Project Ideas": `Give 15 real-world project ideas on "${topic}".`,
    "Resume Improvement": `Improve resume for "${topic}" role with ATS optimization.`,
    "Code Explanation": `Explain "${topic}" step by step in simple language.`,
    "Startup Idea": `Give startup ideas based on "${topic}".`,
    "Interview Prep": `Give interview questions for "${topic}".`,
    "Marketing Strategy": `Create marketing strategy for "${topic}".`,
    "Business Plan": `Write business plan for "${topic}".`
  };

  document.getElementById("output").innerText = map[task];
}

function copy(){
  navigator.clipboard.writeText(document.getElementById("output").innerText);
  alert("Copied!");
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

</script>

</body>
</html>
